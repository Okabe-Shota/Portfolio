          - heading "Overview" [level=2] [ref=e61]
        - paragraph [ref=e63]: 長文の Markdown は全体構造の把握が難しい。従来ツールは構造ツリー表示のみで、図表・数式を確認するにはエディタをスクロールして探し戻る必要があり、「構造俯瞰」と「詳細確認」が分断されていた。頻繁な視点移動は認知負荷を高める（特に図表の多いデータ分析レポートや技術仕様書）。MarkKing は左ペインのマインドマップで文書全体を地図として俯瞰しながら、見出しをクリックすると対応セクションの図表・数式・コードを右ペインのサイドパネルへ即座にレンダリングする。マインドマップで現在地を把握したまま詳細を確認できるため、長文でも「今どこを読んでいるか」を見失わない。学位プロジェクト（卒業研究）として開発した。
