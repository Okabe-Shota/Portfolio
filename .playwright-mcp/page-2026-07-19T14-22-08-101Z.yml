        - generic [ref=e145]:
          - generic [ref=e146]:
            - heading "2 ペイン構成（NAVIGATION + DETAIL VIEW）" [level=3] [ref=e147]
            - paragraph [ref=e148]: 左ペインはマインドマップ（NAVIGATION）。見出し階層をツリーで可視化し、ノード操作で情報粒度を調整する。右ペインはサイドパネル（DETAIL VIEW）。見出しクリックで対応セクションの図表・数式・コードを即座にレンダリングし、スクロールで「探す」手間を排除する。
          - generic [ref=e149]:
            - heading "State Persistence（編集後もノード開閉状態を維持）" [level=3] [ref=e150]
            - paragraph [ref=e151]: 既存ライブラリは一時的な内部 ID でノードを管理するため、編集のたびに ID が再生成され開閉状態がリセットされる。MarkKing は「Root / 第1章 / 1.1節」のような階層パスで永続的に識別し、保存のたびにノードが閉じる現象を根本解決。編集と構造確認をシームレスに往復できる。
          - generic [ref=e152]:
            - heading "統一的図表ハイドレーション（Adapter Pattern）" [level=3] [ref=e153]
            - paragraph [ref=e154]: 12 種類以上のライブラリのバラバラな API を、共通インターフェース render(element, content) で統一する。各ライブラリ用アダプタを実装し、種類に応じて動的選択する。新規ライブラリはアダプタを 1 つ追加するだけで対応でき、コアロジックは変更しない（拡張性・保守性）。
          - generic [ref=e155]:
